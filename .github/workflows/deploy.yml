name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  BACKEND_IMAGE: ghcr.io/nerydlg/dev-nerydlg-service
  DB_IMAGE: ghcr.io/nerydlg/dev-nerydlg-service-db

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push database image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./db/Dockerfile
          push: true
          tags: ${{ env.DB_IMAGE }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: nerydev
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u nerydlg --password-stdin
            docker compose -f /opt/nerydlg.dev/docker-compose.yml pull db backend
            docker logout ghcr.io
            docker compose -f /opt/nerydlg.dev/docker-compose.yml up -d db backend
            docker image prune -f
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
