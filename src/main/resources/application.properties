spring.application.name=dev-nerydlg-service

spring.data.jdbc.dialect=postgresql
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nerydlg_app}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:p4ssw0rd!}

# HMAC signing key for JWTs (Base64-encoded). Override with JWT_SECRET in prod.
jwt.secret=${JWT_SECRET}

logging.level.org.springframework.web=INFO
logging.level.dev.nerydlg=DEBUG
logging.file.name=${LOGGING_FILE_NAME:logs/spring-boot-logging.log}


